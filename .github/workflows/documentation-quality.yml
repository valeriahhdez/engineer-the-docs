name: Docs Quality Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Fetch your documentation files from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: markdownlint quality gate
      - name: Run Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md

