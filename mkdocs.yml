site_name: Engineer the docs

theme:
  name: material
  language: en  # Use 'es' if you want the UI (Search, Next/Prev) in Spanish
  palette: 
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs        # Top-level navigation tabs
    - navigation.sections    # Group sidebar items into sections
    - navigation.expand      # Automatically expand sidebar items
    - search.suggest         # Show search suggestions
    - search.highlight       # Highlight search results on the page